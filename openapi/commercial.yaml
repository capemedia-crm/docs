components:
  schemas:
    CTSDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        medium:
          enum:
          - TV
          - RADIO
          - DIGITAL
          type: string
          description: |-
            * `TV` - TV
            * `RADIO` - Radio
            * `DIGITAL` - Digital
          x-spec-enum-id: aa21c11e9618ab2e
        channel:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        day_of_week:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 255
        uploaded_by:
          type: string
          readOnly: true
        slot_count:
          type: integer
          readOnly: true
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        slots:
          type: array
          items:
            $ref: '#/components/schemas/CommercialSlot'
          readOnly: true
      required:
      - channel
      - created_at
      - date
      - day_of_week
      - id
      - medium
      - slot_count
      - slots
      - title
      - updated_at
      - uploaded_by
    CTSList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        medium:
          enum:
          - TV
          - RADIO
          - DIGITAL
          type: string
          description: |-
            * `TV` - TV
            * `RADIO` - Radio
            * `DIGITAL` - Digital
          x-spec-enum-id: aa21c11e9618ab2e
        channel:
          type: string
          maxLength: 100
        date:
          type: string
          format: date
        day_of_week:
          type: string
          maxLength: 20
        title:
          type: string
          maxLength: 255
        uploaded_by:
          type: string
          readOnly: true
        slot_count:
          type: integer
          readOnly: true
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - channel
      - created_at
      - date
      - day_of_week
      - id
      - medium
      - slot_count
      - title
      - updated_at
      - uploaded_by
    CTSListRequest:
      type: object
      properties:
        medium:
          enum:
          - TV
          - RADIO
          - DIGITAL
          type: string
          description: |-
            * `TV` - TV
            * `RADIO` - Radio
            * `DIGITAL` - Digital
          x-spec-enum-id: aa21c11e9618ab2e
        channel:
          type: string
          minLength: 1
          maxLength: 100
        date:
          type: string
          format: date
        day_of_week:
          type: string
          minLength: 1
          maxLength: 20
        title:
          type: string
          minLength: 1
          maxLength: 255
        metadata: {}
      required:
      - channel
      - date
      - day_of_week
      - medium
      - title
    Campaign:
      type: object
      description: Campaign Serializer
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        reference:
          type: string
