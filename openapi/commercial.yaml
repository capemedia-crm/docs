openapi: 3.0.3
info:
  title: Commercial Service API
  version: 1.0.0
  description: "\n    **Commercial Service API** - Lead management and campaign workflow
    system.\n\n    ## Versioning\n    The API uses URL path versioning (e.g., `/api/v1/`,
    `/api/v2/`).\n    Current version: **v1**\n    "
paths:
  /api/v1/campaigns:
    get:
      operationId: campaigns_list
      description: Campaign ViewSet
      summary: List campaigns
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Campaigns
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampaignList'
              examples:
                CampaignResponse:
                  value:
                    next: http://api.example.org/accounts/?cursor=cD00ODY%3D"
                    previous: http://api.example.org/accounts/?cursor=cj0xJnA9NDg3
                    results:
                    - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                      reference: CP-2024-001
                      start_date: '2024-02-01'
                      end_date: '2024-02-28'
                      status: Campaign In Progress
                      node: on_air
                      company_name: ABC Corporation
                      products:
                      - id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                        name: TV Spot 30s
                      created_at: '2024-01-15T08:00:00Z'
                      updated_at: '2024-01-15T08:00:00Z'
                  summary: Campaign response
          description: ''
    post:
      operationId: campaigns_create
      description: Create a new {self.verbose_name}
      tags:
      - campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
              examples:
                CampaignResponse:
                  value:
                    id: 3fa85f64-5717-4562-b3fc-2c963f66afa6
                    reference: CP-2024-001
                    start_date: '2024-02-01'
                    end_date: '2024-02-28'
                    status: Campaign In Progress
                    node: on_air
                    company_name: ABC Corporation
