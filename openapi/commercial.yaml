openapi: 3.0.3
info:
  title: Commercial Service API
  version: 1.0.0 (v1)
  description: "\n    **Commercial Service API** - Lead management and campaign workflow
    system.\n\n    ## Versioning\n    The API uses URL path versioning (e.g., `/api/v1/`,
    `/api/v2/`).\n    Current version: **v1**\n    "
paths:
  /api/v1/campaigns:
    get:
      operationId: campaigns_list
      description: Campaign ViewSet
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - campaigns
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCampaignList'
          description: ''
    post:
      operationId: campaigns_create
      description: Create a new {self.verbose_name}
      tags:
      - campaigns
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CampaignRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
          description: ''
