          - afternoon
          - evening
          - late_night
          - breaking
          type: string
          description: |-
            * `morning` - Morning
            * `midday` - Midday
            * `afternoon` - Afternoon
            * `evening` - Evening
            * `late_night` - Late Night
            * `breaking` - Breaking
          x-spec-enum-id: c946736aa899c338
        studio:
          type: string
          maxLength: 100
        slot_duration:
