openapi: 3.0.3
info:
  title: Content Service API
  version: 1.0.0 (v1)
  description: "\n    **Content Service API** - Comprehensive content(story) and management
    system.\n    "
paths:
  /api/v1/broadcast/graphics/lower-third/{story_id}/:
    get:
      operationId: broadcast_graphics_lower_third
      description: |-
        Newblue Captivate lower-third XML data feed.

        Captivate polls this URL and maps the returned <field> values to template
        variables (TITLE, REFERENCE, LOCATION, REPORTER, CATEGORY, SUMMARY).

        Setup in Captivate:
          Template → Properties → Data → Data Source: URL
          URL: .../broadcast/graphics/lower-third/{story_id}/
      summary: Captivate lower-third data feed
      parameters:
      - in: path
        name: story_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/broadcast/graphics/ticker/:
    get:
      operationId: broadcast_graphics_ticker
      description: |-
        Captivate news ticker XML data feed — the rolling scroll at the bottom of screen.

        Returns the 20 most recently updated published stories.
        Captivate polls this and maps each <row> to one ticker item.

        Setup in Captivate:
          Ticker/Scroll template → Data Source: URL
          URL: .../broadcast/graphics/ticker/
          Refresh: 30 seconds
      summary: Captivate news ticker feed
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/broadcast/mos/{bulletin_id}/:
    post:
      operationId: broadcast_mos_send
      description: |-
        Push a bulletin's ordered story rundown to Synergy MCR via MOS roCreate.

        Called by a producer in the CRM when the bulletin is locked and ready.
        Synergy receives the full ordered list of stories and prepares them for playout.
        Use PUT to update an already-sent rundown (sends roReplace instead).
      summary: Send rundown to Synergy
      parameters:
      - in: path
        name: bulletin_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/broadcast/mos/{bulletin_id}/delete/:
    delete:
      operationId: broadcast_mos_delete
      description: Send MOS roDelete to clear the rundown from Synergy after the bulletin
        airs.
      summary: Delete rundown from Synergy
      parameters:
      - in: path
        name: bulletin_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/broadcast/mos/status/:
    post:
      operationId: broadcast_mos_status
      description: |-
        Receive mosItemStatus callbacks from Synergy MCR.

        Synergy POSTs MOS XML here each time a story slot changes state:
          READY   → cued up, ready to play
          PLAYING → on air
          STOP    → taken off air
          BUSY    → clip loading

        Configure in Synergy: MOS → NCS Connections → Upper Port callback URL.
        No JWT required — Synergy does not send auth tokens.
      summary: Receive Synergy MOS status callback
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/broadcast/tricaster/datalink/{bulletin_id}/:
    get:
      operationId: broadcast_tricaster_datalink
      description: |-
        Tricaster DataLink HTTP source — polled every 5 seconds.

        Returns plain-text key=value pairs (one per line). Tricaster maps each key
        to a DataLink variable used in the virtual set, DDR labels, and title overlays.

        Setup in Tricaster:
          DataLink → Add Source → HTTP
          URL: .../broadcast/tricaster/datalink/{bulletin_id}/
          Refresh: 5 seconds
      summary: Tricaster DataLink feed
      parameters:
      - in: path
        name: bulletin_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/broadcast/tricaster/events/:
    post:
      operationId: broadcast_tricaster_event
      description: |-
        Receive switcher/DDR events from Tricaster via Network Triggers.

        Setup in Tricaster:
          Automation → Network Triggers → Add
          Event: On Take / DDR Record Start / DDR Record Stop
          Action: HTTP POST → .../broadcast/tricaster/events/
          Body: {"event": "TAKE", "source": "DDR1", "bulletin_id": "..."}

        Currently logs the event. Extend to update on-air state, trigger
        downstream workflows, or sync with the Synergy playout state.
      summary: Receive Tricaster switcher event
      tags:
      - Broadcast
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
