components:
  schemas:
    AddStoryRequest:
      type: object
      properties:
        story:
          type: string
          format: uuid
        order:
          type: integer
          minimum: 1
      required:
      - order
      - story
    BroadcastScheduleList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        medium:
          enum:
          - TV
          - RADIO
          - DIGITAL
          type: string
          description: |-
            * `TV` - TV
            * `RADIO` - Radio
            * `DIGITAL` - Digital
          x-spec-enum-id: aa21c11e9618ab2e
        channel:
          type: string
          maxLength: 100
        month:
          type: integer
          maximum: 2147483647
          minimum: 0
        year:
          type: integer
          maximum: 2147483647
          minimum: 0
        title:
          type: string
          maxLength: 255
        version:
          type: integer
          maximum: 2147483647
          minimum: 0
        effective_from:
          type: string
          format: date
          nullable: true
        effective_to:
          type: string
          format: date
          nullable: true
        uploaded_by:
          type: string
          readOnly: true
        slot_count:
          type: object
          additionalProperties: {}
          readOnly: true
        metadata: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - channel
      - created_at
      - id
      - medium
      - month
      - slot_count
      - title
      - updated_at
      - uploaded_by
      - year
    BroadcastScheduleListRequest:
      type: object
      properties:
        medium:
          enum:
          - TV
          - RADIO
          - DIGITAL
          type: string
          description: |-
            * `TV` - TV
            * `RADIO` - Radio
            * `DIGITAL` - Digital
          x-spec-enum-id: aa21c11e9618ab2e
        channel:
          type: string
          minLength: 1
          maxLength: 100
        month:
          type: integer
          maximum: 2147483647
          minimum: 0
        year:
          type: integer
          maximum: 2147483647
          minimum: 0
        title:
          type: string
          minLength: 1
          maxLength: 255
        version:
          type: integer
          maximum: 2147483647
          minimum: 0
        effective_from:
          type: string
          format: date
          nullable: true
        effective_to:
          type: string
          format: date
          nullable: true
        metadata: {}
      required:
      - channel
      - medium
      - month
      - title
      - year
    Bulletin:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        platform:
          enum:
          - television
          - radio
          type: string
          x-spec-enum-id: 562fafbd4b066458
          description: |-
            Broadcast platform

            * `television` - Television
            * `radio` - Radio
        slot:
          enum:
          - morning
          - midday
          - afternoon
          - evening
          - late_night
          - breaking
          type: string
          x-spec-enum-id: c946736aa899c338
          description: |-
            Scheduled broadcast window

            * `morning` - Morning
            * `midday` - Midday
            * `afternoon` - Afternoon
            * `evening` - Evening
            * `late_night` - Late Night
            * `breaking` - Breaking
        scheduled_at:
          type: string
          format: date-time
          description: Date and time the bulletin is scheduled to air
        studio:
          type: string
          description: Studio or broadcast location
          maxLength: 100
        slot_duration:
          type: string
          nullable: true
          description: Total editorial time allocated for this bulletin slot (e.g.
            30 minutes)
        editor_on_duty:
          type: string
          format: uuid
          nullable: true
          description: User ID of the editor managing this bulletin
        editor_in_chief:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: User ID of the editor in chief / head of news who reviews the
            report
        presenters:
          type: array
          items:
            type: string
            format: uuid
          description: User IDs of the news presenters/anchors for this bulletin
        report_status:
          enum:
          - draft
          - signed_off
          - awaiting_review
          - reviewed
          type: string
          x-spec-enum-id: b4fb3143817d8e95
          readOnly: true
          description: |-
            Current state of the post-bulletin report

            * `draft` - Draft
            * `signed_off` - Signed Off
            * `awaiting_review` - Awaiting Review
            * `reviewed` - Reviewed
        slots:
          type: array
          items:
            $ref: '#/components/schemas/BulletinSlot'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - editor_in_chief
      - id
      - platform
      - report_status
      - scheduled_at
      - slot
      - slots
      - updated_at
    BulletinConfig:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 100
        platform:
          enum:
          - television
          - radio
          type: string
          description: |-
            * `television` - Television
            * `radio` - Radio
          x-spec-enum-id: 562fafbd4b066458
        slot:
          enum:
          - morning
          - midday
          - afternoon
          - evening
          - late_night
          - breaking
          type: string
          description: |-
            * `morning` - Morning
            * `midday` - Midday
            * `afternoon` - Afternoon
            * `evening` - Evening
            * `late_night` - Late Night
            * `breaking` - Breaking
          x-spec-enum-id: c946736aa899c338
        studio:
          type: string
          maxLength: 100
        slot_duration:
          type: string
          nullable: true
        is_active:
          type: boolean
      required:
      - id
      - name
      - platform
      - slot
    BulletinConfigRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        platform:
          enum:
          - television
          - radio
          type: string
          description: |-
            * `television` - Television
