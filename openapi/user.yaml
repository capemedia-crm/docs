openapi: 3.0.3
info:
  title: CapeMedia User Service API
  version: 1.0.0
  description: "\n    **CapeMedia User Service API** - Comprehensive user service
    and management system.\n\n    ## Authentication\n    This API uses **JWT Bearer
    tokens** for authentication.\n\n    1. Login via `/api/v1/auth/login` to obtain
    tokens\n    2. Include the access token in the `Authorization` header: `Bearer
    <access_token>`\n    3. Refresh expired tokens via `/api/v1/auth/refresh-token`\n\n
    \   ## Versioning\n    The API uses URL path versioning (e.g., `/api/v1/`, `/api/v2/`).\n
    \   Current version: **v1**\n    "
  contact:
    name: API Support
    email: thakacreations@gmail.com
  license:
    name: Cape Media
paths:
  /api/v1/auth/correspondents/invite:
    get:
      operationId: correspondents_list
      description: List all correspondent users.
      summary: List correspondents
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Correspondents
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCorrespondentUserList'
          description: ''
    post:
      operationId: correspondents_invite
      description: Send an invitation email to a new correspondent. Internal users
        only.
      summary: Send correspondent invitation
      tags:
      - Correspondents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrespondentInviteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CorrespondentInviteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CorrespondentInviteRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          description: No response body
  /api/v1/auth/correspondents/invite/{token}:
    get:
      operationId: correspondents_validate_token
      description: Check whether an invitation token is valid before showing the registration
        form.
      summary: Validate invitation token
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Correspondents
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: correspondents_register
      description: Self-register as a correspondent using a valid invitation token.
      summary: Complete correspondent registration
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - Correspondents
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrespondentRegisterRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CorrespondentRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CorrespondentRegisterRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrespondentUser'
          description: ''
  /api/v1/auth/department:
    get:
      operationId: departments_list
      description: Return a paginated list of all departments.
      summary: List departments
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Departments
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDepartmentList'
          description: ''
    post:
      operationId: departments_create
      description: Create a new department.
      summary: Create department
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    put:
      operationId: departments_update
      description: Update an existing department.
      summary: Update department
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
  /api/v1/auth/forgot-password:
    post:
      operationId: auth_forgot_password
      description: |-
        Initiate password reset process.

        Request Body:
        {
            "email": "user@example.com"
        }

        Response:
        - 200: Password reset email sent (or email not found - no distinction for security)
        - 400: Invalid email format
        - 500: Server error sending email
      summary: Request password reset email
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/login:
    post:
      operationId: auth_login
      description: |-
        Authenticate user and obtain access tokens.

        This endpoint authenticates a user with Keycloak and returns
        JWT access and refresh tokens for API access.
      summary: Login with username and password
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              Login:
                value:
                  username: john.doe@capemedia.co.ke
                  password: secret
                  realm: capemedia
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOTP'
              examples:
                VerifyOTPResponse:
                  value:
                    status: success
                    message: OTP verified successfully
                    data:
                      access_token: eyJ...
                      refresh_token: eyJ...
                      expires_in: 300
                  summary: Verify OTP response
          description: ''
  /api/v1/auth/logout:
    post:
      operationId: auth_logout
      description: |-
        Logout user with immediate token invalidation.

        This performs a complete logout:
        1. Adds access token to blacklist (immediate invalidation)
        2. Revokes the refresh token (prevents getting new access tokens)
        3. Terminates all Keycloak sessions for the user

        After logout, the access token is immediately invalid on all subsequent requests.
      summary: Logout and invalidate tokens
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
            examples:
              RefreshToken:
                value:
                  refresh_token: eyJhbGciOiJSUzI1NiJ9...
                  realm: capemedia
                summary: Refresh token
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/modules:
    get:
      operationId: auth_me_modules
      summary: Get current user accessible modules
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/permissions:
    get:
      operationId: permissions_list
      summary: List client permissions
      tags:
      - Permissions
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ManageRolePermissions'
          description: ''
  /api/v1/auth/permissions/manage-permissions:
    post:
      operationId: permissions_manage
      summary: Assign or revoke permissions for a role
      tags:
      - Permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageRolePermissions'
          description: ''
  /api/v1/auth/permissions/manage-user-permissions:
    post:
      operationId: permissions_manage_user
      summary: Assign or revoke permissions for a user
      tags:
      - Permissions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ManageRolePermissionsRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManageRolePermissions'
          description: ''
  /api/v1/auth/refresh-token:
    post:
      operationId: auth_token_refresh
      description: |-
        Refresh access token using refresh token.

        This endpoint refreshes an access token using a refresh token.
      summary: Refresh access token
      tags:
      - Authentication
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
            examples:
              RefreshToken:
                value:
                  refresh_token: eyJhbGciOiJSUzI1NiJ9...
                  realm: capemedia
                summary: Refresh token
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequestRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyOTP'
              examples:
                VerifyOTPResponse:
                  value:
                    status: success
                    message: OTP verified successfully
                    data:
                      access_token: eyJ...
                      refresh_token: eyJ...
                      expires_in: 300
                  summary: Verify OTP response
          description: ''
  /api/v1/auth/register:
    post:
      operationId: auth_register
      description: Register a new user.
      summary: Register new user
      tags:
      - Registration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
    put:
      operationId: auth_update_user
      description: |-
        Update a user.

        URL: PUT /api/v1/auth/users/<user_id>
      summary: Update user
      tags:
      - Registration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
    delete:
      operationId: auth_deactivate_user
      description: Deactivate a user.
      summary: Deactivate user
      tags:
      - Registration
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/register-consumer:
    post:
      operationId: auth_register_consumer
      description: Register a new Cape Digi consumer account.
      summary: Register Cape Digi consumer
      tags:
      - Registration
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerRegistration'
          description: ''
  /api/v1/auth/roles:
    get:
      operationId: roles_list
      description: |-
        List realm roles (all realm roles or department-specific realm roles).

        Query Parameters:
        - type: 'realm' or 'department' (default: realm)
        - department_id: Department UUID (required if type=department)

        Returns list of realm roles.
      summary: List roles
      tags:
      - Roles
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CreateListRole'
          description: ''
    post:
      operationId: roles_create
      description: Create a new realm role.
      summary: Create role
      tags:
      - Roles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateListRole'
          description: ''
  /api/v1/auth/roles/{id}:
    get:
      operationId: roles_retrieve
      description: Retrieve a specific realm role by ID with members.
      summary: Get role with members
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Roles
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateListRole'
          description: ''
    put:
      operationId: roles_update
      description: Update a realm role.
      summary: Update role
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - Roles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateListRole'
          description: ''
  /api/v1/auth/roles/add-roles-to-department:
    post:
      operationId: roles_add_to_department
      description: |-
        Add existing realm roles to a department.

        Request Body:
        {
            "department_id": "uuid",
            "roles": [
                {
                    "keycloak_role_id": "uuid1",
                    "name": "Role 1",
                    "description": "Description for Role 1"
                },
                {
                    "keycloak_role_id": "uuid2",
                    "name": "Role 2",
                    "description": "Description for Role 2"
                }
            ]
        }
      summary: Add roles to department
      tags:
      - Roles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateListRole'
          description: ''
  /api/v1/auth/roles/manage-user-roles:
    post:
      operationId: roles_manage_user_roles
      description: Assign or unassign a role to/from a user.
      summary: Assign or unassign role to user
      tags:
      - Roles
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateListRoleRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateListRole'
          description: ''
  /api/v1/auth/section:
    get:
      operationId: sections_list
      description: Return a paginated list of sections, optionally filtered by department.
      summary: List sections
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      tags:
      - Departments
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSectionList'
          description: ''
    post:
      operationId: sections_create
      description: Create a new section under a department.
      summary: Create section
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SectionRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
    put:
      operationId: sections_update
      description: Update an existing section.
      summary: Update section
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SectionRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
  /api/v1/auth/users:
    get:
      operationId: users_list
      description: List all users with pagination and filtering.
      summary: List users
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListUsersList'
          description: ''
  /api/v1/auth/users/{id}:
    get:
      operationId: users_retrieve
      description: Retrieve a single user by ID.
      summary: Get user
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this User.
        required: true
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/{id}/events:
    get:
      operationId: users_events
      description: Get Keycloak events for a specific user (cursor-paginated).
      summary: Get user Keycloak events
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this User.
        required: true
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/{id}/permissions:
    get:
      operationId: users_permissions
      description: Get all client-role permissions for a user, grouped by client.
      summary: Get user permissions
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this User.
        required: true
      tags:
      - Users
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/by-permission:
    post:
      operationId: users_by_permission
      description: |-
        Fetch users by permissions.
        - Default: returns list[user_id]
        - ?expand=true: returns list[{user_id, username, name}]
      summary: Fetch users by permission
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListUsersRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ListUsersRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ListUsersRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/by-role:
    get:
      operationId: users_by_role
      description: |-
        ViewSet for user operations.

