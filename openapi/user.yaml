  /api/v1/auth/users/update-profile:
    patch:
      operationId: auth_users_update_profile_partial_update
      description: Update the authenticated user's own profile.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedListUsersRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedListUsersRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedListUsersRequest'
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
