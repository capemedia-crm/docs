  /api/v1/auth/users/user-info:
    get:
      operationId: auth_users_user_info_retrieve
      description: |-
        Get current authenticated user information.

        Returns enriched user data combining:
        - Keycloak token claims (roles, groups, etc.)
        - Django profile data (department, employee number, etc.)
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/verify-otp:
    post:
      operationId: auth_verify_otp_create
      description: Verify OTP for user.
      tags:
      - auth
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
components:
  schemas:
    ConsumerRegistration:
      type: object
      description: |-
        Serializer for public Cape Digi user self-registration.

        No employee number, department, or phone — consumers only need
        email, name, and a password.  Realm is always capedigi.
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - first_name
      - last_name
    ConsumerRegistrationRequest:
      type: object
      description: |-
        Serializer for public Cape Digi user self-registration.

        No employee number, department, or phone — consumers only need
        email, name, and a password.  Realm is always capedigi.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - email
      - first_name
      - last_name
      - password
    Department:
      type: object
      description: Efficient serializer for Department.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    DepartmentRequest:
      type: object
      description: Efficient serializer for Department.
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
      required:
      - name
    ListUsers:
      type: object
      description: Serializer for listing users with department information.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        name:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 50
        status:
          type: string
          maxLength: 20
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
        inactive_alert:
          type: boolean
          description: |-
