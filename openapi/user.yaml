      properties:
        permissions:
          type: array
          items:
            type: string
          description: Permissions
        action_type:
          enum:
          - assign
          - revoke
          type: string
          description: |-
            * `assign` - assign
            * `revoke` - revoke
          x-spec-enum-id: a0c54a429880861c
        role_id:
          type: string
          description: Role ID
      required:
      - action_type
      - permissions
    ManageRolePermissionsRequest:
