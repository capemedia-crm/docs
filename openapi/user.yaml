openapi: 3.0.3
info:
  title: CapeMedia User Service API
  version: 1.0.0 (v1)
  description: "\n    **CapeMedia User Service API** - Comprehensive user service
    and management system.\n\n    ## Authentication\n    This API uses **JWT Bearer
    tokens** for authentication.\n\n    1. Login via `/api/v1/auth/login` to obtain
    tokens\n    2. Include the access token in the `Authorization` header: `Bearer
    <access_token>`\n    3. Refresh expired tokens via `/api/v1/auth/refresh-token`\n\n
    \   ## Versioning\n    The API uses URL path versioning (e.g., `/api/v1/`, `/api/v2/`).\n
    \   Current version: **v1**\n    "
  contact:
    name: API Support
    email: thakacreations@gmail.com
  license:
    name: Cape Media
paths:
  /api/v1/auth/correspondents/invite:
    get:
      operationId: auth_correspondents_invite_retrieve
      description: List all correspondent users.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: auth_correspondents_invite_create
      description: Create and email a correspondent invitation.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/correspondents/invite/{token}:
    get:
      operationId: auth_correspondents_invite_retrieve_2
      description: Validate an invitation token before showing the registration form.
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
    post:
      operationId: auth_correspondents_invite_create_2
      description: Complete self-registration using an invitation token.
      parameters:
      - in: path
        name: token
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/department:
    get:
      operationId: auth_department_retrieve
      description: |-
        Retrieve a paginated list of resources.

        Returns:
            Paginated response with serialized resource data.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    post:
      operationId: auth_department_create
      description: |-
        Handle POST request to create new resource.

        Args:
            request: Incoming HTTP request with creation data
            *args: Additional positional arguments
            **kwargs: Additional keyword arguments

        Returns:
            Response with created resource or error details
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
    put:
      operationId: auth_department_update
      description: |-
        Handle PUT request to update existing resource.

        Expects 'id' field in request data to identify the resource.

        Args:
            request: Incoming HTTP request with update data
            *args: Additional positional arguments
            **kwargs: Additional keyword arguments

        Returns:
            Response with updated resource or error details
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DepartmentRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
  /api/v1/auth/forgot-password:
    post:
      operationId: auth_forgot_password_create
      description: |-
        Initiate password reset process.

        Request Body:
        {
            "email": "user@example.com"
        }

        Response:
        - 200: Password reset email sent (or email not found - no distinction for security)
        - 400: Invalid email format
        - 500: Server error sending email
      tags:
      - auth
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/login:
    post:
      operationId: auth_login_create
      description: |-
        Authenticate user and obtain access tokens.

        This endpoint authenticates a user with Keycloak and returns
        JWT access and refresh tokens for API access.
      tags:
      - auth
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/auth/logout:
    post:
      operationId: auth_logout_create
      description: |-
        Logout user with immediate token invalidation.

        This performs a complete logout:
        1. Adds access token to blacklist (immediate invalidation)
        2. Revokes the refresh token (prevents getting new access tokens)
        3. Terminates all Keycloak sessions for the user

        After logout, the access token is immediately invalid on all subsequent requests.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/me/modules:
    get:
      operationId: auth_me_modules_retrieve
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/permissions:
    get:
      operationId: auth_permissions_retrieve
      description: List all client roles.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/permissions/manage-permissions:
    post:
      operationId: auth_permissions_manage_permissions_create
      description: List all client roles.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/permissions/manage-user-permissions:
    post:
      operationId: auth_permissions_manage_user_permissions_create
      description: List all client roles.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh-token:
    post:
      operationId: auth_refresh_token_create
      description: |-
        Refresh access token using refresh token.

        This endpoint refreshes an access token using a refresh token.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/register:
    post:
      operationId: auth_register_create
      description: Register a new user.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
    put:
      operationId: auth_register_update
      description: |-
        Update a user.

        URL: PUT /api/v1/auth/users/<user_id>
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Registration'
          description: ''
    delete:
      operationId: auth_register_destroy
      description: Deactivate a user.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/auth/register-consumer:
    post:
      operationId: auth_register_consumer_create
      description: Register a new Cape Digi consumer account.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ConsumerRegistrationRequest'
        required: true
      security:
      - bearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerRegistration'
          description: ''
  /api/v1/auth/roles:
    get:
      operationId: auth_roles_retrieve
      description: |-
        List realm roles (all realm roles or department-specific realm roles).

        Query Parameters:
        - type: 'realm' or 'department' (default: realm)
        - department_id: Department UUID (required if type=department)

        Returns list of realm roles.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: auth_roles_create
      description: Create a new realm role.
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '201':
          description: No response body
  /api/v1/auth/roles/{id}:
    get:
      operationId: auth_roles_retrieve_2
      description: Retrieve a specific realm role by ID with members.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: auth_roles_update
      description: Update a realm role.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/roles/add-roles-to-department:
    post:
      operationId: auth_roles_add_roles_to_department_create
      description: |-
        Add existing realm roles to a department.

        Request Body:
        {
            "department_id": "uuid",
            "roles": [
                {
                    "keycloak_role_id": "uuid1",
                    "name": "Role 1",
                    "description": "Description for Role 1"
                },
                {
                    "keycloak_role_id": "uuid2",
                    "name": "Role 2",
                    "description": "Description for Role 2"
                }
            ]
        }
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/roles/manage-user-roles:
    post:
      operationId: auth_roles_manage_user_roles_create
      description: Assign or unassign a role to/from a user.
      tags:
