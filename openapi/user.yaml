      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
    put:
      operationId: auth_section_update
      description: |-
        Handle PUT request to update existing resource.

        Expects 'id' field in request data to identify the resource.

        Args:
            request: Incoming HTTP request with update data
            *args: Additional positional arguments
            **kwargs: Additional keyword arguments

        Returns:
            Response with updated resource or error details
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SectionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SectionRequest'
        required: true
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Section'
          description: ''
  /api/v1/auth/users:
    get:
      operationId: auth_users_list
      description: List all users with pagination and filtering.
      parameters:
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedListUsersList'
          description: ''
  /api/v1/auth/users/{id}:
    get:
      operationId: auth_users_retrieve
      description: Retrieve a single user by ID.
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this User.
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/{id}/events:
    get:
      operationId: auth_users_events_retrieve
      description: Get Keycloak events for a specific user (cursor-paginated).
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
        description: A UUID string identifying this User.
        required: true
      tags:
      - auth
      security:
      - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsers'
          description: ''
  /api/v1/auth/users/{id}/permissions:
    get:
      operationId: auth_users_permissions_retrieve
      description: Get all client-role permissions for a user, grouped by client.
      parameters:
