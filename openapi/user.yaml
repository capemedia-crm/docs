components:
  schemas:
    ConsumerRegistration:
      type: object
      description: |-
        Serializer for public Cape Digi user self-registration.

        No employee number, department, or phone — consumers only need
        email, name, and a password.  Realm is always capedigi.
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
      required:
      - email
      - first_name
      - last_name
    ConsumerRegistrationRequest:
      type: object
      description: |-
        Serializer for public Cape Digi user self-registration.

        No employee number, department, or phone — consumers only need
        email, name, and a password.  Realm is always capedigi.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
        password:
          type: string
          writeOnly: true
          minLength: 8
        confirm_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - confirm_password
      - email
      - first_name
      - last_name
      - password
    CorrespondentInviteRequest:
      type: object
      description: Validate an invitation request sent by an internal editor/producer.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        notes:
          type: string
          default: ''
      required:
      - email
    CorrespondentRegisterRequest:
      type: object
      description: Validate the self-registration payload submitted by a correspondent.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
        country_code:
          type: string
          minLength: 1
          maxLength: 3
        phone_number:
          type: string
          minLength: 1
          maxLength: 50
        password:
          type: string
          writeOnly: true
          minLength: 8
      required:
      - country_code
      - first_name
      - last_name
      - password
      - phone_number
    CorrespondentUser:
      type: object
      description: Lightweight serializer for listing correspondent users.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        name:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 50
        status:
          type: string
          maxLength: 20
        date_joined:
          type: string
          format: date-time
      required:
      - id
      - name
    CreateListRole:
      type: object
      description: Serializer for Keycloak role information.
      properties:
        name:
          type: string
          description: Role name
        description:
          type: string
          default: ''
          description: Role description
        id:
          type: string
          readOnly: true
          description: Role ID (UUID)
      required:
      - id
      - name
    CreateListRoleRequest:
      type: object
      description: Serializer for Keycloak role information.
      properties:
        name:
          type: string
          minLength: 1
          description: Role name
        description:
          type: string
          default: ''
          description: Role description
        department_id:
          type: string
          format: uuid
          writeOnly: true
          description: Department ID
      required:
      - department_id
      - name
    Department:
      type: object
      description: Efficient serializer for Department.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - updated_at
    DepartmentRequest:
      type: object
      description: Efficient serializer for Department.
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
      required:
      - name
    ForgotPasswordRequest:
      type: object
      description: Serializer for password reset request.
      properties:
        email:
          type: string
          format: email
          minLength: 1
          description: Email address associated with your account
      required:
      - email
    ListUsers:
      type: object
      description: Serializer for listing users with department information.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        username:
          type: string
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        name:
          type: string
          readOnly: true
        phone_number:
          type: string
          maxLength: 50
        status:
          type: string
          maxLength: 20
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
        inactive_alert:
          type: boolean
          description: |-
            True if the user has not logged in for 2 or more business days (Mon–Fri).

            None last_login (never logged in) is also treated as inactive.
          readOnly: true
      required:
      - id
      - inactive_alert
      - name
      - username
    ListUsersRequest:
      type: object
      description: Serializer for listing users with department information.
      properties:
        username:
          type: string
          minLength: 1
          pattern: ^[\w.@+-]+$
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        phone_number:
          type: string
          maxLength: 50
        status:
          type: string
          minLength: 1
          maxLength: 20
        date_joined:
          type: string
          format: date-time
        last_login:
          type: string
          format: date-time
          nullable: true
      required:
      - username
    LoginRequest:
      type: object
      properties:
        username:
          type: string
          minLength: 1
          description: Username or email
        password:
          type: string
          minLength: 1
          description: Password
        realm:
          type: string
          minLength: 1
          default: capemedia
          description: Keycloak realm name (e.g. 'capemedia', 'capedigi'). Defaults
            to primary realm.
      required:
      - password
      - username
    ManageRolePermissions:
      type: object
