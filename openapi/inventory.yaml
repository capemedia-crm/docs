  /api/v1/bookings/{order_id}/send-to-transit:
    post:
      tags:
      - Bookings
      summary: Send To Transit
      description: "Mark a booking STAGED after verifying every line has a document-linked\
        \ asset.\n\nSaga pattern — mirrors commercial-service → inv-service:\n  1.\
        \ Commit STAGED to DB.\n  2. Notify commercial-service (with exponential-backoff\
        \ retry on transient errors).\n  3. If notification still fails after all\
        \ retries → compensate by reverting\n     STAGED → APPROVED so the operator\
        \ can retry without data corruption."
