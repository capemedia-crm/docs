  /api/v1/bookings/{order_id}/signed-document:
    patch:
      tags:
      - Bookings
      summary: Link Signed Document
      description: "Attach the client-signed booking sheet to the order.\n\nCalled\
        \ directly by the Business Executive after receiving the signed sheet\nfrom\
        \ the client. Saga pattern:\n  1. Set BookingOrder.signed_document_id and\
        \ log BOOKING_SHEET_LINKED.\n  2. Notify commercial-service to advance the\
        \ workflow from\n     NODE_SIGNED_SHEET_UPLOAD to GATE_CD_APPROVAL.\n  3.\
        \ If notification fails → unset signed_document_id so the operator can retry."
      operationId: link_signed_document_api_v1_bookings__order_id__signed_document_patch
      security:
      - HTTPBearer: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Order Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkSignedDocumentBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/bookings/{order_id}/hof-decision:
    post:
      tags:
      - Bookings
      summary: Hof Decision
      description: "Head of Finance approves or rejects the booking at node 122.\n\
        \nApprove:\n  1. Commit APPROVED → TRAFFIC_READY.\n  2. Notify commercial-service\
        \ (hof_approve) — creates Campaign, advances\n     workflow to NODE_STAGE_BOOKING\
        \ (node 112).\n  3. Notification fails → revert TRAFFIC_READY → APPROVED so\
        \ HoF can retry.\n\nReject (no inv-service state change):\n  1. Notify commercial-service\
        \ (hof_reject) — workflow routes back to\n     NODE_SIGNED_SHEET_UPLOAD (node\
        \ 120) for re-upload and re-approval."
      operationId: hof_decision_api_v1_bookings__order_id__hof_decision_post
      security:
      - HTTPBearer: []
      parameters:
      - name: order_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Order Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HofDecisionBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/bookings/{order_id}/cd-decision:
    post:
      tags:
      - Bookings
      summary: Cd Decision
      description: "Commercial Director approves or rejects the booking sheet at GATE_CD_APPROVAL.\n\
        \nNeither path changes BookingOrder.status — the CD decision is a gate on\
        \ the\ncommercial-service workflow only. inv-service writes an audit log entry\
        \ so the\nback-office can see the decision and any remarks.\n\nApprove: log\
        \ CD_APPROVED → notify commercial-service (cd_approve).\nReject:  log CD_REJECTED\
        \ → notify commercial-service (cd_reject).\n         Workflow routes back\
        \ to NODE_SIGNED_SHEET_UPLOAD for re-upload."
      operationId: cd_decision_api_v1_bookings__order_id__cd_decision_post
      security:
      - HTTPBearer: []
