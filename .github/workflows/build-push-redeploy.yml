name: Build & Deploy via Fleet (Docs)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: fleet-${{ github.ref_name }}-${{ github.repository }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: capemedia-crm/docs
  DEVOPS_REPO: capemedia-crm/devops

jobs:
  build_push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "image_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  fleet_update:
    name: Fleet Update (prod)
    runs-on: ubuntu-latest
    needs: build_push
    timeout-minutes: 5
    steps:
      - name: Update image tag in Fleet values
        env:
          DEVOPS_REPO_TOKEN: ${{ secrets.DEVOPS_REPO_TOKEN }}
          IMAGE_TAG: ${{ needs.build_push.outputs.image_tag }}
        run: |
          set -euo pipefail

          git clone \
            https://x-access-token:${DEVOPS_REPO_TOKEN}@github.com/${{ env.DEVOPS_REPO }}.git \
            devops-repo
          cd devops-repo

          VALUES="prod/docs/values.yaml"

          sed -i "s|^  tag:.*|  tag: ${IMAGE_TAG}|" "$VALUES"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$VALUES"
          git diff --cached --quiet && echo "No image change, skipping commit." && exit 0

          git commit -m "chore(docs/prod): deploy ${IMAGE_TAG}

          Actor: ${{ github.actor }}
          Commit: ${{ github.sha }}
          Ref: ${{ github.ref_name }}"
          git push

          echo "✅ prod/docs/values.yaml → image.tag: ${IMAGE_TAG}"
